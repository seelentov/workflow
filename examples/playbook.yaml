# Example playbook: deploy a web application
- name: Prepare all servers
  hosts: all
  vars:
    base_dir: /opt/myapp
    app_user: appuser

  tasks:
    - name: Update apt cache
      shell: apt-get update -y

    - name: Install required packages
      shell: apt-get install -y curl wget tar

    - name: Create application directory
      shell: mkdir -p {{ .base_dir }}

    - name: Create application user
      shell: id {{ .app_user }} || useradd -r -s /bin/false {{ .app_user }}
      ignore_errors: true


- name: Deploy web application
  hosts: web
  vars:
    base_dir: /opt/myapp
    app_version: "1.2.3"
    app_port: 8080

  tasks:
    - name: Upload application binary
      copy:
        src: ./bin/app
        dest: "{{ .base_dir }}/app"
        mode: "0755"

    - name: Upload config from template
      template:
        src: ./templates/config.yaml.tmpl
        dest: "{{ .base_dir }}/config.yaml"
        mode: "0644"

    - name: Stop old process
      shell: pkill -f "{{ .base_dir }}/app" || true
      ignore_errors: true
      tags:
        - restart

    - name: Start application
      shell: nohup {{ .base_dir }}/app --port {{ .app_port }} &>/var/log/myapp.log &
      tags:
        - restart

    - name: Wait for application to be ready
      shell: sleep 2 && curl -sf http://localhost:{{ .app_port }}/health
      tags:
        - restart


- name: Collect logs
  hosts: web
  vars:
    log_dir: ./logs

  tasks:
    - name: Fetch application log
      fetch:
        src: /var/log/myapp.log
        dest: "{{ .log_dir }}/{{ .host }}-app.log"
      tags:
        - collect-logs

# Playbook: полный пример HTTP-задач
#
# Запуск:
#   workflow run -i examples/inventory.yaml --dry-run examples/http-playbook.yaml
#   workflow run -i examples/inventory.yaml --verbose  examples/http-playbook.yaml
#   workflow run -i examples/inventory.yaml --tags health examples/http-playbook.yaml

# ──────────────────────────────────────────────────────────────
# 1. Получить токен через Basic auth и сохранить в переменную
# ──────────────────────────────────────────────────────────────
- name: Authenticate
  hosts: all
  vars:
    api_base: https://httpbin.org

  tasks:
    - name: Получить Bearer-токен через Basic auth
      http:
        method: POST
        url: "{{ .api_base }}/anything"
        basic_auth:
          username: admin
          password: secret
        json:
          grant_type: password
          scope: deploy
        expect_status: [200]
        register: auth          # ответ сохранится в переменную auth
      ignore_errors: true       # httpbin.org вернёт 200, реальный API может вернуть 401

    - name: Сохранить токен из ответа
      vars:
        token: "fake-jwt-token"   # в реальном случае: {{ index .auth "access_token" }}


# ──────────────────────────────────────────────────────────────
# 2. Деплой приложения на серверы
# ──────────────────────────────────────────────────────────────
- name: Deploy application
  hosts: web
  vars:
    app_dir: /opt/myapp
    app_port: 8080
    app_version: "2.1.0"
    token: "fake-jwt-token"

  tasks:
    - name: Создать рабочую директорию
      shell: mkdir -p {{ .app_dir }}

    # Уведомить внешний API о начале деплоя
    - name: "[API] Открыть maintenance window"
      http:
        method: POST
        url: "{{ .api_base }}/anything/deployments"
        bearer: "{{ .token }}"
        headers:
          X-Deploy-Host: "{{ .host }}"
          X-Request-ID: "deploy-{{ .host }}-{{ .app_version }}"
        json:
          host: "{{ .host }}"
          version: "{{ .app_version }}"
          action: start
        expect_status: [200, 201, 202]
        register: deploy_event
        timeout: 10s
      ignore_errors: true
      tags: [notify]

    - name: Остановить старый процесс
      shell: pkill -f "{{ .app_dir }}/app" || true
      ignore_errors: true

    - name: Запустить приложение
      shell: nohup {{ .app_dir }}/app --port {{ .app_port }} &>/var/log/myapp.log &


# ──────────────────────────────────────────────────────────────
# 3. Health-check каждого сервера через HTTP
# ──────────────────────────────────────────────────────────────
- name: Health checks
  hosts: web
  vars:
    app_port: 8080

  tasks:
    # GET-запрос к каждому серверу; {{ .hostname }} — IP из inventory
    - name: Проверить health endpoint
      http:
        method: GET
        url: "http://{{ .hostname }}:{{ .app_port }}/health"
        timeout: 5s
        expect_status: [200]
        register: health
        follow_redirects: false
      ignore_errors: true
      tags: [health]

    # Показать статус в shell-команде (используем зарегистрированный ответ)
    - name: Напечатать статус health-check
      shell: echo "health status={{ .health.status }} ok={{ .health.ok }}"
      tags: [health]


# ──────────────────────────────────────────────────────────────
# 4. REST CRUD: создать, получить, обновить, удалить запись
# ──────────────────────────────────────────────────────────────
- name: REST CRUD demo (httpbin.org/anything)
  hosts: web1   # запускаем только с одного хоста, чтобы не дублировать
  vars:
    api_base: https://httpbin.org
    token: "fake-jwt-token"

  tasks:
    # POST — создать ресурс
    - name: "[API] POST — создать пользователя"
      http:
        method: POST
        url: "{{ .api_base }}/anything/users"
        bearer: "{{ .token }}"
        json:
          name: deploy-bot
          role: ci
          tags:
            - automation
            - "{{ .host }}"
        expect_status: [200, 201]
        register: created_user
      tags: [crud]

    # GET — прочитать ресурс (ID берём из предыдущего ответа)
    - name: "[API] GET — получить пользователя"
      http:
        method: GET
        url: "{{ .api_base }}/anything/users/42"
        bearer: "{{ .token }}"
        headers:
          Accept: application/json
        expect_status: [200]
        register: user
      tags: [crud]

    # PUT — полное обновление
    - name: "[API] PUT — обновить пользователя"
      http:
        method: PUT
        url: "{{ .api_base }}/anything/users/42"
        bearer: "{{ .token }}"
        json:
          name: deploy-bot
          role: admin
        expect_status: [200]
      tags: [crud]

    # PATCH — частичное обновление
    - name: "[API] PATCH — изменить роль"
      http:
        method: PATCH
        url: "{{ .api_base }}/anything/users/42"
        bearer: "{{ .token }}"
        json:
          role: readonly
        expect_status: [200]
      tags: [crud]

    # DELETE
    - name: "[API] DELETE — удалить пользователя"
      http:
        method: DELETE
        url: "{{ .api_base }}/anything/users/42"
        bearer: "{{ .token }}"
        expect_status: [200, 204]
      tags: [crud]


# ──────────────────────────────────────────────────────────────
# 5. Form data, raw body, кастомный Content-Type, self-signed SSL
# ──────────────────────────────────────────────────────────────
- name: Advanced HTTP features
  hosts: web1
  vars:
    api_base: https://httpbin.org

  tasks:
    # Form-encoded тело
    - name: "[API] POST form data"
      http:
        method: POST
        url: "{{ .api_base }}/anything"
        form:
          username: admin
          password: secret
          redirect_uri: "http://{{ .hostname }}/callback"
        expect_status: [200]
      tags: [advanced]

    # Raw body с кастомным Content-Type
    - name: "[API] POST raw XML"
      http:
        method: POST
        url: "{{ .api_base }}/anything"
        headers:
          Content-Type: application/xml
          X-Host: "{{ .host }}"
        body: |
          <?xml version="1.0"?>
          <request>
            <host>{{ .host }}</host>
            <action>deploy</action>
          </request>
        expect_status: [200]
      tags: [advanced]

    # Отключить проверку SSL (для self-signed сертификатов)
    - name: "[API] GET с self-signed SSL"
      http:
        method: GET
        url: "https://self-signed.badssl.com/"
        verify_ssl: false
        timeout: 10s
        expect_status: [200]
        ignore_errors: true
      tags: [advanced]

    # HEAD — только заголовки
    - name: "[API] HEAD — проверить наличие ресурса"
      http:
        method: HEAD
        url: "{{ .api_base }}/status/200"
        expect_status: [200]
        register: head_resp
      tags: [advanced]


# ──────────────────────────────────────────────────────────────
# 6. Webhook-уведомления по итогам деплоя
# ──────────────────────────────────────────────────────────────
- name: Notify on completion
  hosts: web
  vars:
    api_base: https://httpbin.org
    app_version: "2.1.0"
    token: "fake-jwt-token"
    slack_webhook: "https://httpbin.org/anything/slack"  # замените на реальный

  tasks:
    - name: "[Webhook] Slack — деплой завершён"
      http:
        method: POST
        url: "{{ .slack_webhook }}"
        json:
          text: ":white_check_mark: Deployed *{{ .app_version }}* on `{{ .host }}`"
          username: workflow-bot
        expect_status: [200]
        timeout: 5s
        ignore_errors: true
      tags: [notify]

    - name: "[API] Закрыть maintenance window"
      http:
        method: PATCH
        url: "{{ .api_base }}/anything/deployments/latest"
        bearer: "{{ .token }}"
        json:
          host: "{{ .host }}"
          version: "{{ .app_version }}"
          action: finish
          success: true
        expect_status: [200]
        ignore_errors: true
      tags: [notify]

# Tasks with conditional execution based on shell checks
# Demonstrates: when conditionals - tasks are skipped if shell returns non-zero

- name: Conditional system configuration
  hosts: mixed_os
  tasks:
    - name: Check if running Ubuntu
      shell: grep -q ubuntu /etc/os-release 2>/dev/null && echo "ubuntu" || echo "not-ubuntu"
      ignore_errors: true
      when: "grep -q ubuntu /etc/os-release 2>/dev/null"

    - name: Update apt packages (Ubuntu only)
      shell: apt-get update -y && apt-get upgrade -y
      ignore_errors: true
      when: "grep -q ubuntu /etc/os-release 2>/dev/null"

    - name: Update yum packages (CentOS only)
      shell: yum update -y
      ignore_errors: true
      when: "grep -q centos /etc/os-release 2>/dev/null || grep -q rhel /etc/os-release 2>/dev/null"

    - name: Install Docker
      shell: |
        if command -v docker &>/dev/null; then
          echo "Docker already installed"
        else
          echo "Installing Docker..."
          curl -fsSL https://get.docker.com | sh
        fi
      ignore_errors: true

    - name: Check available disk space
      shell: df -h / | awk 'NR==2 {print $5}' | tr -d '%'

    - name: Warn if disk usage is high
      shell: echo "WARNING: Disk usage is above 80%"
      when: "[ $(df / | awk 'NR==2 {print $5}' | tr -d '%') -gt 80 ]"
      ignore_errors: true

    - name: Check if swap is enabled
      shell: swapon --show | wc -l

    - name: Disable swap if enabled
      shell: swapoff -a
      when: "[ $(swapon --show | wc -l) -gt 0 ]"
      ignore_errors: true

    - name: Set hostname if not already set
      shell: hostnamectl set-hostname "workflow-managed-$(hostname -s)"
      when: "hostname | grep -q 'workflow-managed' && exit 1 || exit 0"
      ignore_errors: true

    - name: Print system information
      shell: |
        echo "OS: $(cat /etc/os-release | grep PRETTY_NAME | cut -d= -f2)"
        echo "Kernel: $(uname -r)"
        echo "Uptime: $(uptime -p)"
        echo "Memory: $(free -h | awk 'NR==2 {print $3\"/\"$2}')"
